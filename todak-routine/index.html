      :root {

      }

      body {
        margin: 0;
        background: #fff9f0;
      }

      #launch-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #fff9f0;
        transition: opacity 240ms ease, visibility 240ms ease;
      }

      #launch-splash.is-hidden {
        opacity: 0;
        visibility: hidden;
      }

      .launch-splash-image {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
        object-position: center;
        image-rendering: pixelated;
      }

  <body>
    <div id="launch-splash" aria-hidden="true">
      <img
        class="launch-splash-image"
        src="./brand/todak-babylog-splash.png"
        alt=""
      />
    </div>
    <div id="root"></div>
    <script>
      (function () {
        const splash = document.getElementById("launch-splash");
        if (!splash) return;

        let removed = false;
        const removeSplash = function () {
          if (removed) return;
          removed = true;
          splash.classList.add("is-hidden");
          window.setTimeout(function () {
            splash.remove();
          }, 260);
        };

        window.addEventListener("todak:app-ready", removeSplash, { once: true });
        window.setTimeout(removeSplash, 2400);
      })();
    </script>
  </body>
