<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>토닥 새로고침 중</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", sans-serif;
        background: #f6efe4;
        color: #38516a;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(171, 229, 214, 0.45), transparent 32%),
          #f6efe4;
      }

      main {
        width: min(440px, calc(100% - 32px));
        padding: 28px 24px;
        border: 1px solid rgba(255, 255, 255, 0.95);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.7);
        box-shadow: 0 18px 40px rgba(170, 155, 130, 0.12);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 24px;
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: rgba(56, 81, 106, 0.82);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>새 버전으로 바꾸는 중이에요</h1>
      <p id="message">예전 캐시를 지우고 새 화면으로 다시 연결하고 있어요.</p>
    </main>
    <script>
      (async () => {
        const message = document.getElementById("message");

        try {
          if ("serviceWorker" in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map((registration) => registration.unregister()));
          }

          if ("caches" in window) {
            const keys = await caches.keys();
            await Promise.all(keys.map((key) => caches.delete(key)));
          }

          message.textContent = "정리됐어요. 메인 화면으로 이동합니다.";
        } catch (error) {
          message.textContent = "정리 중 문제가 있었지만 메인 화면으로 다시 열어볼게요.";
        }

        window.setTimeout(() => {
          window.location.replace("./");
        }, 900);
      })();
    </script>
  </body>
</html>
